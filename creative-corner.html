<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Creative Corner">
<meta name="theme-color" content="#1a0f2e">
<title>Creative Corner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0a1e;
  --bg2: #1a1130;
  --bg3: #251a3f;
  --surface: #2d2050;
  --surface2: #3a2a68;
  --accent: #c4a8ff;
  --accent2: #ff9eb5;
  --accent3: #7fffd4;
  --text: #f0eaff;
  --text2: #a89ec8;
  --text3: #6a5f8a;
  --border: rgba(196,168,255,0.15);
  --border2: rgba(196,168,255,0.28);
  --radius: 18px;
  --radius-sm: 10px;
  --nav-h: 72px;
  --font-display: 'DM Serif Display', serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 400; }

/* Background decoration */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 0%, rgba(140,80,255,0.18) 0%, transparent 60%),
              radial-gradient(ellipse 60% 50% at 80% 100%, rgba(255,100,150,0.12) 0%, transparent 60%);
  pointer-events: none;
}

#app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

/* Header */
.app-header {
  padding: 52px 20px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.app-title { font-family: var(--font-display); font-size: 26px; color: var(--text); letter-spacing: -0.3px; }
.app-title span { color: var(--accent); font-style: italic; }
.inv-count {
  font-size: 12px; font-weight: 500; padding: 4px 12px;
  background: var(--surface); border-radius: 20px; color: var(--accent);
  border: 1px solid var(--border);
}

/* Screens */
.screens { flex: 1; overflow: hidden; position: relative; }
.screen { position: absolute; inset: 0; overflow-y: auto; padding: 0 16px 16px; display: none; -webkit-overflow-scrolling: touch; }
.screen.active { display: block; }

/* Bottom nav */
.bottom-nav {
  flex-shrink: 0; height: var(--nav-h);
  display: flex; align-items: stretch;
  background: rgba(26,17,48,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; background: none; border: none; cursor: pointer;
  color: var(--text3); transition: color 0.2s;
  font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
}
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; transition: transform 0.2s; }
.nav-btn.active .nav-icon { transform: scale(1.1); }

/* Chat screen */
.chat-messages {
  display: flex; flex-direction: column; gap: 12px;
  padding-bottom: 120px;
}
.msg {
  max-width: 82%; padding: 12px 16px; border-radius: 18px;
  font-size: 15px; line-height: 1.55; animation: msgIn 0.25s ease;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.msg.bot {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text); align-self: flex-start; border-bottom-left-radius: 6px;
}
.msg.user {
  background: linear-gradient(135deg, #7c4de8, #9b5de5);
  color: #fff; align-self: flex-end; border-bottom-right-radius: 6px;
}
.msg.typing { color: var(--text3); font-style: italic; }

.chat-input-area {
  position: fixed; bottom: var(--nav-h); left: 0; right: 0;
  padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  background: rgba(15,10,30,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
  z-index: 10;
}
.chat-input {
  flex: 1; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 22px; padding: 10px 16px; color: var(--text);
  font-family: var(--font-body); font-size: 15px; resize: none;
  outline: none; max-height: 100px; line-height: 1.4;
}
.chat-input::placeholder { color: var(--text3); }
.chat-input:focus { border-color: var(--accent); }
.mic-btn, .send-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  flex-shrink: 0; transition: transform 0.15s, background 0.2s;
}
.mic-btn { background: var(--surface); color: var(--accent); }
.mic-btn:active, .send-btn:active { transform: scale(0.92); }
.mic-btn.recording { background: rgba(255,80,80,0.2); color: #ff5050; animation: recPulse 1s infinite; }
@keyframes recPulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(255,80,80,0.3)} 50%{opacity:0.8;box-shadow:0 0 0 8px rgba(255,80,80,0)} }
.send-btn { background: linear-gradient(135deg, #7c4de8, #9b5de5); color: #fff; }

.hint-text { font-size: 11px; color: var(--text3); text-align: center; padding: 4px 0 0; }

/* Inventory screen */
.section-title { font-family: var(--font-display); font-size: 22px; color: var(--text); margin-bottom: 16px; margin-top: 8px; }
.inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 80px; }
.inv-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; display: flex; flex-direction: column; gap: 8px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.inv-name { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
.inv-cat { font-size: 11px; color: var(--text3); }
.qty-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.qty-ctrl { display: flex; align-items: center; gap: 8px; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 50%; background: var(--surface);
  border: 1px solid var(--border); color: var(--accent); font-size: 16px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  line-height: 1;
}
.qty-num { font-size: 15px; font-weight: 500; color: var(--text); min-width: 20px; text-align: center; }
.del-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--font-body); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-label { font-size: 15px; line-height: 1.5; }

/* Activities screen */
.act-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.activity-card {
  background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 14px; overflow: hidden; animation: fadeUp 0.3s ease;
}
.act-header { padding: 16px 16px 12px; }
.act-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.act-title { font-family: var(--font-display); font-size: 19px; color: var(--text); line-height: 1.2; }
.time-pill {
  font-size: 11px; font-weight: 500; padding: 4px 11px; border-radius: 20px;
  background: rgba(127,255,212,0.12); color: var(--accent3); border: 1px solid rgba(127,255,212,0.25);
  white-space: nowrap; flex-shrink: 0;
}
.motivation-line {
  font-size: 13px; color: var(--accent); font-style: italic;
  padding: 8px 12px; background: rgba(196,168,255,0.08);
  border-radius: var(--radius-sm); margin-bottom: 10px;
  border-left: 2px solid var(--accent);
}
.act-desc { font-size: 14px; color: var(--text2); line-height: 1.5; }
.mat-pills { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 16px 12px; }
.mat-pill {
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  background: var(--surface); color: var(--text2); border: 1px solid var(--border);
}
.steps-section { padding: 12px 16px; border-top: 1px solid var(--border); }
.steps-label { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.step-item { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
.step-dot {
  width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
  background: var(--surface); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: var(--accent); margin-top: 1px;
}
.step-text { font-size: 14px; color: var(--text); line-height: 1.5; }
.yt-btn {
  display: flex; align-items: center; gap: 8px; margin: 12px 16px 16px;
  padding: 11px 16px; border-radius: var(--radius-sm);
  background: rgba(255,0,0,0.1); border: 1px solid rgba(255,80,80,0.25);
  color: #ff8080; font-size: 14px; text-decoration: none; font-family: var(--font-body);
  font-weight: 500;
}
.new-session-btn {
  width: calc(100% - 32px); margin: 0 16px 20px; padding: 14px;
  border-radius: var(--radius); border: 1px solid var(--border2);
  background: var(--surface); color: var(--accent);
  font-family: var(--font-body); font-size: 15px; font-weight: 500; cursor: pointer;
  letter-spacing: 0.01em;
}
.acts-wrapper { padding-bottom: 20px; }
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="app-title">Creative <span>Corner</span></div>
    <div class="inv-count" id="invCount">0 materials</div>
  </div>

  <div class="screens">
    <!-- CHAT -->
    <div id="screen-chat" class="screen active">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <!-- INVENTORY -->
    <div id="screen-inventory" class="screen">
      <div class="section-title">Your materials</div>
      <div class="inv-grid" id="invGrid">
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🧵</div>
          <div class="empty-label">No materials yet.<br>Tell the assistant what you have!</div>
        </div>
      </div>
    </div>

    <!-- ACTIVITIES -->
    <div id="screen-activities" class="screen">
      <div class="acts-wrapper" id="actsWrapper">
        <div class="act-empty">
          <div class="empty-icon">🎨</div>
          <div class="empty-label" style="font-size:15px;margin-bottom:20px;">Tell the assistant how long<br>you have to get activity ideas!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat input (only visible on chat screen) -->
  <div class="chat-input-area" id="chatInputArea">
    <button class="mic-btn" id="micBtn" onclick="toggleVoice()">🎙</button>
    <textarea class="chat-input" id="chatInput" rows="1" placeholder="What materials do you have? How long today?" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendMessage()">↑</button>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-chat" onclick="switchTab('chat')">
      <span class="nav-icon">💬</span>
      <span>Assistant</span>
    </button>
    <button class="nav-btn" id="nav-inventory" onclick="switchTab('inventory')">
      <span class="nav-icon">📦</span>
      <span>Inventory</span>
    </button>
    <button class="nav-btn" id="nav-activities" onclick="switchTab('activities')">
      <span class="nav-icon">✨</span>
      <span>Activities</span>
    </button>
  </nav>
</div>

<script>
const ANTHROPIC_API = "https://api.anthropic.com/v1/messages";
let inventory = JSON.parse(localStorage.getItem('cc_inventory') || '{}');
let conversationHistory = JSON.parse(localStorage.getItem('cc_history') || '[]');
let isRecording = false;
let recognition = null;

function saveData() {
  localStorage.setItem('cc_inventory', JSON.stringify(inventory));
  localStorage.setItem('cc_history', JSON.stringify(conversationHistory.slice(-30)));
}

function switchTab(tab) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('chatInputArea').style.display = tab === 'chat' ? 'flex' : 'none';
}

function updateInvCount() {
  const n = Object.keys(inventory).length;
  document.getElementById('invCount').textContent = n + ' material' + (n !== 1 ? 's' : '');
}

function renderInventory() {
  const grid = document.getElementById('invGrid');
  const keys = Object.keys(inventory);
  updateInvCount();
  if (!keys.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🧵</div><div class="empty-label">No materials yet.<br>Tell the assistant what you have!</div></div>';
    return;
  }
  grid.innerHTML = keys.map(k => `
    <div class="inv-card">
      <div>
        <div class="inv-name">${k}</div>
        <div class="inv-cat">${inventory[k].category || 'supplies'}</div>
      </div>
      <div class="qty-row">
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${k.replace(/'/g,"\\'")}', -1)">−</button>
          <span class="qty-num">${inventory[k].qty}</span>
          <button class="qty-btn" onclick="changeQty('${k.replace(/'/g,"\\'")}', 1)">+</button>
        </div>
        <button class="del-btn" onclick="removeItem('${k.replace(/'/g,"\\'")}')">✕</button>
      </div>
    </div>`).join('');
}

function changeQty(item, delta) {
  if (!inventory[item]) return;
  inventory[item].qty = Math.max(0, inventory[item].qty + delta);
  if (inventory[item].qty === 0) delete inventory[item];
  renderInventory(); saveData();
}

function removeItem(item) {
  delete inventory[item];
  renderInventory(); saveData();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function addBotMsg(text, typing = false) {
  const w = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = 'msg bot' + (typing ? ' typing' : '');
  d.textContent = text;
  w.appendChild(d);
  w.scrollTop = w.scrollHeight;
  return d;
}

function addUserMsg(text) {
  const w = document.getElementById('chatMessages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  w.appendChild(d);
  w.scrollTop = w.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  addUserMsg(text);
  conversationHistory.push({ role: 'user', content: text });
  const typing = addBotMsg('...', true);

  const systemPrompt = `You are a warm, encouraging creative assistant for someone with ADHD. Your tone is friendly, brief, and never overwhelming.

Current inventory: ${JSON.stringify(inventory)}

Rules:
1. INVENTORY: If user mentions materials/craft supplies, extract them into this JSON at the START of your reply:
{"INVENTORY_UPDATE":[{"name":"item name","qty":1,"category":"painting/sewing/paper crafts/embroidery/general"}]}

2. TIME + ACTIVITY: If user mentions available time (e.g. "20 minutes", "2 hours"), suggest 2-3 projects using their inventory:
{"ACTIVITIES":[{"title":"Name","time":"20 min","description":"One warm sentence","motivation":"Short hype sentence max 10 words","materials":["item1"],"steps":["Detailed step 1","Step 2","Step 3","Step 4","Step 5"],"youtube":"https://www.youtube.com/results?search_query=beginner+project+name+tutorial"}]}

3. Keep chat replies to 1-2 sentences. Be encouraging. No bullet points.
4. If inventory is empty and user asks what to make, ask them what materials they have first.
Always put JSON blocks before your chat message.`;

  try {
    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1200,
        system: systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    let fullText = data.content?.[0]?.text || "Hmm, something went wrong. Try again!";
    let display = fullText;

    const invMatch = fullText.match(/\{"INVENTORY_UPDATE":\[[\s\S]*?\]\}/);
    if (invMatch) {
      try {
        const parsed = JSON.parse(invMatch[0]);
        parsed.INVENTORY_UPDATE.forEach(item => {
          inventory[item.name] = inventory[item.name]
            ? { ...inventory[item.name], qty: inventory[item.name].qty + item.qty }
            : { qty: item.qty, category: item.category };
        });
        renderInventory(); saveData();
        display = display.replace(invMatch[0], '').trim();
      } catch(e){}
    }

    const actMatch = fullText.match(/\{"ACTIVITIES":\[[\s\S]*?\]\}/);
    if (actMatch) {
      try {
        const parsed = JSON.parse(actMatch[0]);
        renderActivities(parsed.ACTIVITIES);
        display = display.replace(actMatch[0], '').trim();
      } catch(e){}
    }

    display = display.replace(/^\n+/, '').trim();
    typing.textContent = display || (actMatch ? "I've added some activity ideas for you — check the Activities tab!" : "Got it!");
    typing.classList.remove('typing');
    conversationHistory.push({ role: 'assistant', content: fullText });
    saveData();
  } catch(e) {
    typing.textContent = "Something went wrong. Try again!";
    typing.classList.remove('typing');
  }
}

function renderActivities(activities) {
  const wrapper = document.getElementById('actsWrapper');
  wrapper.innerHTML = activities.map(a => `
    <div class="activity-card">
      <div class="act-header">
        <div class="act-top">
          <div class="act-title">${a.title}</div>
          <span class="time-pill">${a.time}</span>
        </div>
        <div class="motivation-line">"${a.motivation}"</div>
        <div class="act-desc">${a.description}</div>
      </div>
      <div class="mat-pills">${(a.materials||[]).map(m=>`<span class="mat-pill">${m}</span>`).join('')}</div>
      <div class="steps-section">
        <div class="steps-label">How to do it</div>
        ${(a.steps||[]).map((s,i)=>`<div class="step-item"><span class="step-dot">${i+1}</span><span class="step-text">${s}</span></div>`).join('')}
      </div>
      <a class="yt-btn" href="${a.youtube}" target="_blank">▶ Find a tutorial on YouTube</a>
    </div>`).join('') +
    `<button class="new-session-btn" onclick="newSession()">Start a new session ✦</button>`;
  switchTab('activities');
}

function newSession() {
  switchTab('chat');
  addBotMsg("Ready for a new creative session! 🎨 How many minutes do you have today?");
}

function toggleVoice() {
  const btn = document.getElementById('micBtn');
  const input = document.getElementById('chatInput');

  if (isRecording) {
    if (recognition) recognition.stop();
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎙';
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    addBotMsg("Voice input isn't available in this browser. Try opening the file in Chrome on Android, or Safari on iPhone!");
    return;
  }

  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    addBotMsg("Voice input needs HTTPS to work. Host this file on a secure server, or use the keyboard for now!");
    return;
  }

  navigator.mediaDevices.getUserMedia({ audio: true })
    .then(() => startRecognition(btn, input))
    .catch(err => {
      if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
        addBotMsg("Microphone access was denied. Please allow mic access in your browser settings and try again.");
      } else {
        addBotMsg("Couldn't access your microphone. Check that it's not being used by another app.");
      }
    });
}

function startRecognition(btn, input) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = navigator.language || 'en-US';
  recognition.interimResults = true;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isRecording = true;
    btn.classList.add('recording');
    btn.textContent = '⏹';
    input.placeholder = 'Listening...';
  };

  recognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    input.value = final || interim;
    autoResize(input);
    if (final) {
      isRecording = false;
      btn.classList.remove('recording');
      btn.textContent = '🎙';
      input.placeholder = 'What materials do you have? How long today?';
      setTimeout(() => sendMessage(), 200);
    }
  };

  recognition.onerror = e => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎙';
    input.placeholder = 'What materials do you have? How long today?';
    const msgs = {
      'no-speech': "I didn't catch anything — tap the mic and try speaking again!",
      'audio-capture': "Couldn't capture audio. Make sure your mic is working.",
      'not-allowed': "Mic access was blocked. Please enable it in browser settings.",
      'network': "Network error during voice recognition. Check your connection.",
    };
    addBotMsg(msgs[e.error] || "Voice recognition had an issue (" + e.error + "). Try again!");
  };

  recognition.onend = () => {
    if (isRecording) {
      isRecording = false;
      btn.classList.remove('recording');
      btn.textContent = '🎙';
      input.placeholder = 'What materials do you have? How long today?';
    }
  };

  try {
    recognition.start();
  } catch(e) {
    addBotMsg("Couldn't start voice input. Try tapping the mic again.");
    isRecording = false;
    btn.classList.remove('recording');
    btn.textContent = '🎙';
  }
}

// Init
renderInventory();
if (conversationHistory.length === 0) {
  addBotMsg("Hey! I'm your Creative Corner assistant ✦ Tell me what craft materials you have at home and I'll keep track. When you're ready to make something, just say how long you have!");
} else {
  conversationHistory.filter(m => m.role !== 'system').slice(-6).forEach(m => {
    if (m.role === 'user') addUserMsg(m.content);
    else {
      let text = m.content.replace(/\{"INVENTORY_UPDATE"[\s\S]*?\]\}/g,'').replace(/\{"ACTIVITIES"[\s\S]*?\]\}/g,'').trim();
      if (text) addBotMsg(text);
    }
  });
}
</script>
</body>
